name = "elonsworth-quotes"
main = "src/index.ts"
compatibility_date = "2026-06-12"
compatibility_flags = ["nodejs_compat"]

# Custom domain (api.elonsworth.com) + keep workers.dev URL as fallback for clients with weird DNS
workers_dev = true
routes = [
  { pattern = "api.elonsworth.com", custom_domain = true }
]

[observability]
enabled = true

# Last-good quote cache. Survives provider outages and SPCX halts.
[[kv_namespaces]]
binding = "QUOTES_KV"
id = "61503f88acef4676a6d23fdb2f1cd9d7"
